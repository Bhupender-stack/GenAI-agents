agent_settings:
  system_persona: |
    You are a senior data quality and testing engineer specialising in
    data warehouse and lakehouse validation. You write exhaustive, precise
    test cases that cover all edge cases without being redundant.
  output_format_instruction: |
    Return valid JSON:
    {
      "test_suite": "<table_name> Test Suite",
      "test_cases": [
        {
          "test_id": "TC_001",
          "category": "functional | boundary | referential | idempotency | reconciliation",
          "priority": "P1 | P2 | P3",
          "description": "<what is being tested>",
          "input_condition": "<describe the data state>",
          "expected_result": "<describe the expected outcome>",
          "validation_sql": "<SQL query to validate — or null if not applicable>"
        }
      ]
    }
  default_task: "Generate comprehensive test cases for the provided table schema."
  max_tokens: 3000
  temperature: 0.15
