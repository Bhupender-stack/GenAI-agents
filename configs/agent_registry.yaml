# =============================================================================
# Agent Registry
# agent_platform/configs/agent_registry.yaml
# =============================================================================

agents:

  # ---------------------------------------------------------------------------
  # Agentic agents (LLM-driven)
  # ---------------------------------------------------------------------------

  - id: data_model_gen
    display_name: "Data Model Generator"
    description: "Generate Data Vault 2.0 or dimensional models from table metadata"
    category: "Modelling"
    type: "agentic"
    icon: "🏗️"
    enabled: true
    config_path: "agents/data_model_gen/config.yaml"
    tags: ["data-vault", "dimensional", "silver", "gold"]

  - id: test_case_gen
    display_name: "Test Case Generator"
    description: "Generate functional and data validation test cases"
    category: "Testing"
    type: "agentic"
    icon: "🧪"
    enabled: true
    config_path: "agents/test_case_gen/config.yaml"
    tags: ["testing", "validation"]

  - id: test_query_gen
    display_name: "Test Query Generator"
    description: "Generate SQL validation queries"
    category: "Testing"
    type: "agentic"
    icon: "🔍"
    enabled: true
    config_path: "agents/test_query_gen/config.yaml"
    tags: ["sql", "testing"]

  - id: dq_recommender
    display_name: "DQ Rule Recommender"
    description: "Suggest data quality rules"
    category: "Data Quality"
    type: "agentic"
    icon: "✅"
    enabled: true
    config_path: "agents/dq_recommender/config.yaml"

  - id: dq_query_gen
    display_name: "DQ Query Generator"
    description: "Generate SQL for DQ checks"
    category: "Data Quality"
    type: "agentic"
    icon: "📋"
    enabled: true
    config_path: "agents/dq_query_gen/config.yaml"

  - id: lineage_creator
    display_name: "Data Lineage Creator"
    description: "Generate dataset lineage"
    category: "Governance"
    type: "agentic"
    icon: "🔗"
    enabled: true
    config_path: "agents/lineage_creator/config.yaml"

  - id: sttm_gen
    display_name: "STTM Generator"
    description: "Create Source-to-Target Mapping documents"
    category: "Documentation"
    type: "agentic"
    icon: "📄"
    enabled: true
    config_path: "agents/sttm_gen/config.yaml"

  # ---------------------------------------------------------------------------
  # Non-agentic agents (deterministic — zero LLM cost)
  # ---------------------------------------------------------------------------

  - id: schema_compare
    display_name: "Schema Compare"
    description: "Strict audit-safe schema comparison between SIMS1 and SIMS2"
    category: "Excel"
    type: "non_agentic"
    icon: "📊"
    enabled: true
    config_path: "agents/schema_compare/config.yaml"
    tags:
      - gap-analysis
      - migration
      - audit-safe

  - id: schema_gap_analysis
    display_name: "Schema Gap Analysis"
    description: "Perform schema-level and column-level gap analysis between SIMS1 and SIMS2 using manual Excel inputs or direct database metadata"
    category: "Data Quality"
    type: "non_agentic"
    icon: "🔍"
    enabled: true
    config_path: "agents/schema_gap_analysis/config.yaml"
    tags:
      - schema
      - gap-analysis
      - migration
      - reconciliation
      - data-quality

  - id: data_profiler
    display_name: "Data Profiler"
    description: "Generate column-level statistics"
    category: "Profiling"
    type: "non_agentic"
    icon: "📊"
    enabled: true
    config_path: "agents/data_profiler/config.yaml"

  - id: sample_gen
    display_name: "Sample Data Generator"
    description: "Generate synthetic sample data"
    category: "Profiling"
    type: "non_agentic"
    icon: "🎲"
    enabled: true
    config_path: "agents/sample_gen/config.yaml"

  - id: ingestion_cfg_gen
    display_name: "Ingestion Config Generator"
    description: "Generate Databricks ingestion configs"
    category: "Ingestion"
    type: "non_agentic"
    icon: "⚙️"
    enabled: true
    config_path: "agents/ingestion_cfg/config.yaml"
